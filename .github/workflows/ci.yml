name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: 稳定版质量门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanxu
          path: .yanxu/toolchain
          ref: v1.1.8
      - name: 构建当前稳定言序
        run: cargo build --manifest-path .yanxu/toolchain/Cargo.toml --locked --bin yanxu
      - name: 清单、权限与文档结构
        shell: sh
        run: |
          set -eu
          yanxu="$GITHUB_WORKSPACE/.yanxu/toolchain/target/debug/yanxu"
          "$yanxu" 包 .
          "$yanxu" 包 integration/消费者
          for file in README.md LICENSE CHANGELOG.md COMPATIBILITY.md SECURITY.md CONTRIBUTING.md docs/API.md docs/GUIDE.md docs/ARCHITECTURE.md docs/OBSERVABILITY.md docs/ERRORS.md docs/PERFORMANCE.md docs/MIGRATION_1.0.md docs/RELEASE_NOTES_1.0.0.md; do test -f "$file"; done
          test -d examples
          test -d tests
          test -d benchmarks
          test -d integration/消费者
          grep -F '版本 = "1.0.0"' 言序.toml
          grep -F '公 定 版本：文 为 「1.0.0」；' src/言韧.yx
          grep -F '言序 = ">=1.1.6"' 言序.toml
          grep -F '许可 = "MIT"' 言序.toml
          grep -F '文件 = []' 言序.toml
          grep -F '网络 = []' 言序.toml
          grep -F 'TCP监听 = []' 言序.toml
          grep -F 'UDP绑定 = []' 言序.toml
          grep -F '环境 = []' 言序.toml
          grep -F '进程 = false' 言序.toml
          grep -F '原生扩展 = false' 言序.toml
      - name: 格式、静态检查与 API 漂移
        shell: sh
        run: |
          set -eu
          yanxu="$GITHUB_WORKSPACE/.yanxu/toolchain/target/debug/yanxu"
          find src tests examples benchmarks integration -type f -name '*.yx' -print | while IFS= read -r file; do
            "$yanxu" 格 "$file" | cmp - "$file"
            "$yanxu" 查 "$file"
          done
          "$yanxu" 文 src/言韧.yx "$RUNNER_TEMP/API.md"
          cmp docs/API.md "$RUNNER_TEMP/API.md"
      - name: 规格、对照、示例、基准、消费者与发布构建
        shell: sh
        run: |
          set -eu
          yanxu="$GITHUB_WORKSPACE/.yanxu/toolchain/target/debug/yanxu"
          "$yanxu" 试 tests --json
          for file in tests/*.yx; do printf '字节码规格：%s\n' "$file"; "$yanxu" 字节 "$file"; done
          for file in examples/*.yx; do printf '树示例：%s\n' "$file"; "$yanxu" "$file"; printf '字节码示例：%s\n' "$file"; "$yanxu" 字节 "$file"; done
          for file in benchmarks/*.yx; do printf '树基准：%s\n' "$file"; "$yanxu" "$file"; printf '字节码基准：%s\n' "$file"; "$yanxu" 字节 "$file"; done
          "$yanxu" 兼容 tests --json > "$RUNNER_TEMP/tests-compat.json"
          "$yanxu" 兼容 examples --json > "$RUNNER_TEMP/examples-compat.json"
          "$yanxu" 兼容 benchmarks --json > "$RUNNER_TEMP/benchmarks-compat.json"
          "$yanxu" 兼容 integration/消费者 --json > "$RUNNER_TEMP/consumer-compat.json"
          for report in "$RUNNER_TEMP/tests-compat.json" "$RUNNER_TEMP/examples-compat.json" "$RUNNER_TEMP/benchmarks-compat.json" "$RUNNER_TEMP/consumer-compat.json"; do jq -e '[.cases[].passed] | all' "$report"; cat "$report"; done
          cp 言序.lock "$RUNNER_TEMP/root.lock.before"
          cp integration/消费者/言序.lock "$RUNNER_TEMP/consumer.lock.before"
          "$yanxu" 包 锁 .
          "$yanxu" 包 锁 --离线 .
          "$yanxu" 包 锁 integration/消费者
          "$yanxu" 包 锁 --离线 integration/消费者
          "$yanxu" 包 运行 integration/消费者
          "$yanxu" 编 . -o "$RUNNER_TEMP/yanxu-retry-release.yxb" --release
          "$yanxu" 编 integration/消费者 -o "$RUNNER_TEMP/yanxu-retry-consumer.yxb" --release
          test -s "$RUNNER_TEMP/yanxu-retry-release.yxb"
          test -s "$RUNNER_TEMP/yanxu-retry-consumer.yxb"
          sed '/^target = /d' "$RUNNER_TEMP/root.lock.before" > "$RUNNER_TEMP/root.lock.expected"
          sed '/^target = /d' 言序.lock > "$RUNNER_TEMP/root.lock.actual"
          sed '/^target = /d' "$RUNNER_TEMP/consumer.lock.before" > "$RUNNER_TEMP/consumer.lock.expected"
          sed '/^target = /d' integration/消费者/言序.lock > "$RUNNER_TEMP/consumer.lock.actual"
          cmp "$RUNNER_TEMP/root.lock.expected" "$RUNNER_TEMP/root.lock.actual"
          cmp "$RUNNER_TEMP/consumer.lock.expected" "$RUNNER_TEMP/consumer.lock.actual"
          git diff --exit-code -- . ':(exclude,top)言序.lock' ':(exclude,top)integration/消费者/言序.lock'
          test -z "$(git ls-files --others --exclude-standard)"

  metadata:
    name: 新增元数据门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: 检查分支、PR 与新增提交
        shell: sh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          set -eu
          if printf '%s\n%s\n%s\n' "$HEAD_BRANCH" "$PR_TITLE" "$PR_BODY" | grep -Eiq 'co[d]ex'; then
            echo '分支或 PR 元数据包含禁用词'
            exit 1
          fi
          if test -n "$BASE_SHA" && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            if git log "$BASE_SHA"..HEAD --format='%H%n%an%n%ae%n%cn%n%ce%n%s%n%b' | grep -Eiq 'co[d]ex'; then
              echo '新增提交元数据包含禁用词'
              exit 1
            fi
          fi

  compatibility:
    name: 言序 1.1.6 · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanxu
          path: .yanxu/toolchain
          ref: v1.1.6
      - name: 构建最低言序
        run: cargo build --manifest-path .yanxu/toolchain/Cargo.toml --locked --bin yanxu
      - name: 跨平台兼容验证
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            yanxu="$GITHUB_WORKSPACE/.yanxu/toolchain/target/debug/yanxu.exe"
          else
            yanxu="$GITHUB_WORKSPACE/.yanxu/toolchain/target/debug/yanxu"
          fi
          "$yanxu" --version
          "$yanxu" 包 .
          "$yanxu" 包 integration/消费者
          find src tests examples benchmarks integration -type f -name '*.yx' -print | while IFS= read -r file; do "$yanxu" 查 "$file"; done
          "$yanxu" 试 tests --json
          for file in tests/*.yx; do printf '字节码规格：%s\n' "$file"; "$yanxu" 字节 "$file"; done
          for file in examples/*.yx; do printf '树示例：%s\n' "$file"; "$yanxu" "$file"; printf '字节码示例：%s\n' "$file"; "$yanxu" 字节 "$file"; done
          for file in benchmarks/*.yx; do printf '树基准：%s\n' "$file"; "$yanxu" "$file"; printf '字节码基准：%s\n' "$file"; "$yanxu" 字节 "$file"; done
          "$yanxu" 兼容 tests --json
          "$yanxu" 兼容 examples --json
          "$yanxu" 兼容 benchmarks --json
          "$yanxu" 兼容 integration/消费者 --json
          cp 言序.lock "$RUNNER_TEMP/root.lock.before"
          cp integration/消费者/言序.lock "$RUNNER_TEMP/consumer.lock.before"
          "$yanxu" 包 锁 .
          "$yanxu" 包 锁 --离线 .
          "$yanxu" 包 锁 integration/消费者
          "$yanxu" 包 锁 --离线 integration/消费者
          "$yanxu" 包 运行 integration/消费者
          "$yanxu" 编 . -o "$RUNNER_TEMP/yanxu-retry.yxb" --release
          "$yanxu" 编 integration/消费者 -o "$RUNNER_TEMP/yanxu-retry-consumer.yxb" --release
          test -s "$RUNNER_TEMP/yanxu-retry.yxb"
          test -s "$RUNNER_TEMP/yanxu-retry-consumer.yxb"
          sed -e '/^generator = /d' -e '/^target = /d' "$RUNNER_TEMP/root.lock.before" > "$RUNNER_TEMP/root.lock.expected"
          sed -e '/^generator = /d' -e '/^target = /d' 言序.lock > "$RUNNER_TEMP/root.lock.actual"
          sed -e '/^generator = /d' -e '/^target = /d' "$RUNNER_TEMP/consumer.lock.before" > "$RUNNER_TEMP/consumer.lock.expected"
          sed -e '/^generator = /d' -e '/^target = /d' integration/消费者/言序.lock > "$RUNNER_TEMP/consumer.lock.actual"
          cmp "$RUNNER_TEMP/root.lock.expected" "$RUNNER_TEMP/root.lock.actual"
          cmp "$RUNNER_TEMP/consumer.lock.expected" "$RUNNER_TEMP/consumer.lock.actual"
